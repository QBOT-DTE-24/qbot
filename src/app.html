<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%" prefix="og: https://ogp.me/ns#">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		<meta name="application-name" content="QBOT" />
		<meta name="author" content="QBOT-DTE/24" />
		<meta name="description" content="The QBOT Project website. Where our creation and stories are written." />
		<meta
			name="keywords"
			content="eraya, qbot, kinaray-a, svelte, qbot-dte, qbot-dte/24. dte/24, dte 24"
		/>
		<meta name="theme-color" content="#FE2424" />

		<!-- FOR SEARCH ENGINE -->
		<meta itemprop="name" content="The 	QBOT Project" />
		<meta itemprop="description" content="The QBOT Project website. Where our creation and stories are written."" />
		<meta itemprop="image" content="/img/qbot-banner.png" />

		<!-- OPEN GRAPH METADATA-->
		<meta property="og:site_name" content="The QBOT Project" />
		<meta property="og:url" content="https://qbot.eu.cc" />
		<meta property="og:title" content="QBOT" />
		<meta property="og:description" content="The QBOT Project website. Where our creation and stories are written."" />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/img/qbot-banner.png" />
		<meta property="og:image:width" content="1280" />
		<meta property="og:image:height" content="640" />
		<title>The QBOT Project</title>

		<!-- FOR TWITTER/X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="The QBOT Project" />
		<meta name="twitter:description" content="The QBOT Project website. Where our creation and stories are written."" />
		<meta name="twitter:image" content="https://qbot.eu.cc/img/qbot-banner.png" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div class="app">
			<div id="deviceready">%sveltekit.body%</div>
		</div>

		<script src="cordova.js"></script>
		<script src="js/index.js"></script>
	</body>
</html>
